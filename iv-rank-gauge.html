<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비트코인 IV Rank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .widget {
            text-align: center;
            width: 100%;
            max-width: 360px;
        }

        .title-link {
            display: block;
            margin-bottom: 12px;
        }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
        }

        .arrow {
            display: inline-block;
            font-size: 1rem;
            color: #52525b;
            margin-left: 2px;
            transition: transform 0.2s;
        }

        a.page-link:hover .arrow { transform: translateX(3px); }

        .gauge-wrap {
            position: relative;
            width: 240px;
            height: 160px;
            margin: 0 auto 8px;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .gauge-segment {
            fill: none;
            stroke-width: 22;
            stroke-linecap: butt;
        }

        .seg-green  { stroke: #22c55e; }
        .seg-yellow { stroke: #eab308; }
        .seg-red    { stroke: #ef4444; }

        .needle {
            fill: #22d3ee;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            transition: transform 1s cubic-bezier(0.34,1.56,0.64,1);
            transform-origin: 150px 150px;
        }

        .needle-dot {
            fill: #18181b;
            stroke: #22d3ee;
            stroke-width: 2;
        }

        .val-box {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }

        .zone {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 6px;
            padding: 3px 14px;
            border-radius: 4px;
            display: inline-block;
        }

        .zone.low     { color: #22c55e; background: rgba(34,197,94,0.15); }
        .zone.neutral { color: #eab308; background: rgba(234,179,8,0.15); }
        .zone.high    { color: #ef4444; background: rgba(239,68,68,0.15); }

        .markers {
            display: flex;
            justify-content: space-between;
            width: 240px;
            margin: 4px auto 0;
            padding: 0 8px;
        }

        .markers span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #52525b;
        }

        .dvol-info {
            margin-top: 12px;
            font-size: 0.75rem;
            color: #71717a;
        }

        .dvol-info span {
            font-family: 'JetBrains Mono', monospace;
            color: #a1a1aa;
        }

        .updated {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #52525b;
        }

        @media (max-width: 360px) {
            .gauge-wrap { width: 200px; height: 135px; }
            .val { font-size: 2.2rem; }
            .markers { width: 200px; }
            .title { font-size: 1rem; }
            .dvol-info { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <a href="https://herdvibe.com/27" target="_top" class="page-link" style="text-decoration:none;color:inherit;display:block;cursor:pointer;">
    <div class="widget">
        <div class="title-link">
            <span class="title">비트코인 IV Rank <span class="arrow">›</span></span>
        </div>

        <div class="gauge-wrap">
            <svg class="gauge-svg" viewBox="0 0 300 180">
                <path class="gauge-segment seg-green"  d="M 25 150 A 125 125 0 0 1 65 55" />
                <path class="gauge-segment seg-yellow" d="M 65 55 A 125 125 0 0 1 235 55" />
                <path class="gauge-segment seg-red"    d="M 235 55 A 125 125 0 0 1 275 150" />
                <g class="needle" id="needle">
                    <polygon points="150,45 144,150 150,140 156,150" />
                </g>
                <circle class="needle-dot" cx="150" cy="150" r="8" />
            </svg>
            <div class="val-box">
                <div class="val" id="index-value">--</div>
                <div class="zone neutral" id="zone-label">로딩중...</div>
            </div>
        </div>

        <div class="markers">
            <span>0</span><span>30</span><span>50</span><span>70</span><span>100</span>
        </div>

        <div class="dvol-info" id="dvol-info"></div>
        <div class="updated" id="last-updated"></div>
    </div>
    </a>

    <script>
        async function loadData() {
            try {
                var r = await fetch('data.json');
                if (!r.ok) throw new Error('not found');
                return await r.json();
            } catch (e) { console.error(e); return null; }
        }

        function calculateIVRank(arr) {
            var high = Math.max.apply(null, arr);
            var low = Math.min.apply(null, arr);
            var cur = arr[arr.length - 1];
            var rank = ((cur - low) / (high - low)) * 100;
            return { ivRank: Math.round(rank), current: cur.toFixed(2), high: high.toFixed(2), low: low.toFixed(2) };
        }

        function getZoneInfo(v) {
            if (v <= 30) return { name: '저변동성', cls: 'low' };
            if (v <= 70) return { name: '중립', cls: 'neutral' };
            return { name: '고변동성', cls: 'high' };
        }

        function setNeedle(v) {
            document.getElementById('needle').style.transform =
                'rotate(' + ((v / 100) * 180 - 90) + 'deg)';
        }

        function fmtDate(iso) {
            return new Date(iso).toLocaleDateString('ko-KR', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        async function init() {
            var d = await loadData();
            if (!d || !d.dvol || !d.dvol.length) {
                document.getElementById('index-value').textContent = '--';
                document.getElementById('zone-label').textContent = '데이터 없음';
                return;
            }
            var iv = calculateIVRank(d.dvol);
            document.getElementById('index-value').textContent = iv.ivRank;
            var z = getZoneInfo(iv.ivRank);
            var el = document.getElementById('zone-label');
            el.textContent = z.name;
            el.className = 'zone ' + z.cls;
            document.getElementById('dvol-info').innerHTML =
                'DVOL: <span>' + iv.current + '%</span> · 52주 최저: <span>' + iv.low + '%</span> · 52주 최고: <span>' + iv.high + '%</span>';
            setTimeout(function(){ setNeedle(iv.ivRank); }, 100);
            if (d.last_updated)
                document.getElementById('last-updated').textContent =
                    '마지막 업데이트: ' + fmtDate(d.last_updated);
        }

        init();
    </script>
    <script>
    function sendHeight(){
        window.parent.postMessage({
            id:'hvIVRank',
            height:document.documentElement.scrollHeight,
            desktopHeight:420,
            mobileHeight:380
        },'*');
    }
    window.addEventListener('load',function(){sendHeight();setTimeout(sendHeight,500);setTimeout(sendHeight,1500)});
    window.addEventListener('resize',sendHeight);
    </script>
</body>
</html>
